    // ===== AUDIO BEEPS =====
    const useBeeper = () => {
      const ctxRef = useRef(null);
      const ensureCtx = () => {
        if (!ctxRef.current) {
          try { ctxRef.current = new (window.AudioContext || window.webkitAudioContext)(); }
          catch(e) { return null; }
        }
        if (ctxRef.current && ctxRef.current.state === 'suspended') ctxRef.current.resume();
        return ctxRef.current;
      };
      const tone = (freq, dur, vol = 0.25) => {
        const ctx = ensureCtx(); if (!ctx) return;
        const o = ctx.createOscillator(); const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = freq; o.type = 'sine';
        g.gain.setValueAtTime(vol, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        o.start(); o.stop(ctx.currentTime + dur);
      };
      return {
        initAudio: ensureCtx,
        countdown: () => tone(600, 0.1, 0.2),
        startWork: () => { tone(900, 0.15, 0.32); setTimeout(() => tone(900, 0.15, 0.32), 180); },
        startRest: () => tone(450, 0.25, 0.28),
        finish: () => { tone(700, 0.18); setTimeout(() => tone(900, 0.18), 220); setTimeout(() => tone(1200, 0.45), 440); }
      };
    };

      const [secondsLeft, setSecondsLeft] = useState(0);
      const [running, setRunning] = useState(false);
      const [soundOn, setSoundOn] = useState(true);
      const [totalElapsed, setTotalElapsed] = useState(0);
      const beeper = useBeeper();

      const workout = workouts.find(w => w.id === workoutId);
      const phase = workout?.phases[phaseIdx];
      const totalDuration = workout ? workout.phases.reduce((acc, p) => acc + p.duration, 0) : 0;
      const colors = phase ? (phaseColors[phase.type] || phaseColors.work) : phaseColors.work;

      // Timer
      useEffect(() => {
        if (!running || view !== 'workout') return;
        const interval = setInterval(() => {
          setSecondsLeft(prev => {
            if (prev <= 1) return 0;
            if (soundOn && prev <= 4 && prev > 1) beeper.countdown();
            return prev - 1;
          });
          setTotalElapsed(prev => prev + 1);
        }, 1000);
        return () => clearInterval(interval);
      }, [running, view, soundOn]);

      // Phase transition
      useEffect(() => {
        if (!running || secondsLeft !== 0) return;
        if (phaseIdx >= (workout?.phases.length || 0) - 1) {
          setRunning(false);
          if (soundOn) beeper.finish();
          setView('complete');
          return;
        }
        const next = workout.phases[phaseIdx + 1];
        if (soundOn) {
          if (next.type === 'work' || next.type === 'bike') beeper.startWork();
          else beeper.startRest();
        }
        setPhaseIdx(i => i + 1);
        setSecondsLeft(next.duration);
      }, [secondsLeft, running]);

      const startWorkout = (id) => {
        const w = workouts.find(w => w.id === id);
        setWorkoutId(id);
        setPhaseIdx(0);
        setSecondsLeft(w.phases[0].duration);
        setTotalElapsed(0);
        setRunning(false);
        setView('workout');
        beeper.initAudio();
      };

        const id = map[window.location.hash];
        if (id) startWorkout(id);
      }, []);

        if (!running) beeper.initAudio();
        setRunning(r => !r);
      };

        if (!workout) return;
        if (phaseIdx >= workout.phases.length - 1) {
          setRunning(false); setView('complete'); return;

        const next = workout.phases[phaseIdx + 1];
        setPhaseIdx(i => i + 1);
        setSecondsLeft(next.duration);
      };

        setRunning(false); setView('home'); setWorkoutId(null);

                </div>
                <h1 className="text-3xl font-bold mb-2">Allenamento Outdoor</h1>
                <p className="text-slate-400 text-sm">3 sedute a settimana · 60 minuti ciascuna</p>
              </header>

                <p className="text-amber-100/90">
                  Ogni seduta include riscaldamento, mobilità, lavoro e stretching. Tutela cervicale, anche e ginocchia integrata.
                </p>
              </div>

              <div className="space-y-3">
                {workouts.map(w => (
                  <button key={w.id} onClick={() => startWorkout(w.id)}

                    <div className="flex items-center gap-4">
                      <div className="text-4xl">{w.icon}</div>
                      <div className="flex-1">
                        <div className="text-xs uppercase tracking-wider text-slate-500 font-medium">Giorno {w.id}</div>

                        <div className="text-sm text-slate-400">{w.subtitle}</div>
                        <div className="text-xs text-slate-500 mt-2">⏱ 60 min · {w.phases.length} fasi</div>
                      </div>
                      <ChevronRight className="w-6 h-6 text-slate-600" />

                <ArrowLeft className="w-5 h-5" />
              </button>
              <div className="text-center">
                <div className="text-xs opacity-80 uppercase tracking-wider">{workout.title}</div>
                <div className="text-sm font-mono font-bold">{fmtTime(totalElapsed)} / {fmtTime(totalDuration)}</div>
              </div>
              <button onClick={() => setSoundOn(s => !s)} className="p-2 hover:bg-black/20 rounded-lg">
                {soundOn ? <Volume2 className="w-5 h-5" /> : <VolumeX className="w-5 h-5" />}
              </button>
            </div>

            {/* Total progress bar */}
            <div className="px-4 mb-2">
              <div className="h-1 bg-black/20 rounded-full overflow-hidden">
                <div className="h-full bg-white/60 transition-all duration-1000" style={{ width: `${totalProgress}%` }} />
              </div>
            </div>

            {/* Phase label */}
            <div className="px-4 text-center mt-2">
              <div className="inline-block bg-black/30 px-3 py-1 rounded-full text-xs font-bold tracking-wider">
                {colors.label} · Fase {phaseIdx + 1}/{workout.phases.length}
              </div>
            </div>

            {/* Figure */}
            <div className="flex-1 flex items-center justify-center px-6 py-4">
              <div className="w-48 h-48 text-white/95">
                <Fig type={phase.figure} className="w-full h-full" />
              </div>
            </div>

            {/* Exercise name */}
            <div className="px-4 text-center mb-3">
              <h2 className="text-2xl font-bold mb-2 leading-tight">{phase.name}</h2>
              <p className="text-sm text-white/85 leading-snug max-w-md mx-auto">{phase.instruction}</p>
              {phase.tip && (
                <div className="mt-3 mx-auto max-w-md bg-black/30 rounded-lg px-3 py-2 text-xs">
                  {phase.tip}
                </div>
              )}
            </div>

            {/* Big Timer */}
            <div className="px-4 mb-3">
              <div className="text-center">
                <div className={`text-7xl font-mono font-bold tabular-nums ${secondsLeft <= 3 && secondsLeft > 0 && running ? 'animate-pulse' : ''}`}>
                  {fmtTime(secondsLeft)}
                </div>
              </div>
              <div className="mt-2 max-w-md mx-auto">
                <div className="h-2 bg-black/30 rounded-full overflow-hidden">
                  <div className="h-full bg-white transition-all duration-1000" style={{ width: `${progress}%` }} />
                </div>
              </div>
            </div>

            {/* Next phase preview */}
            {phaseIdx + 1 < workout.phases.length && (
              <div className="px-4 mb-3 text-center">
                <div className="inline-block bg-black/25 px-3 py-1.5 rounded-lg text-xs">
                  <span className="opacity-70">Prossima:</span>{' '}
                  <span className="font-semibold">{workout.phases[phaseIdx + 1].name}</span>
                  <span className="opacity-70"> · {fmtTime(workout.phases[phaseIdx + 1].duration)}</span>
                </div>
              </div>
            )}

            {/* Controls */}
            <div className="p-4 pb-8 flex items-center justify-center gap-4">
              <button onClick={togglePlay}
                className="bg-white text-slate-900 w-20 h-20 rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-transform">
                {running
                  ? <Pause className="w-10 h-10" fill="currentColor" />
                  : <Play className="w-10 h-10 ml-1" fill="currentColor" />}
              </button>
              <button onClick={skipPhase}
                className="bg-black/30 hover:bg-black/40 w-14 h-14 rounded-full flex items-center justify-center active:scale-95 transition-transform">
                <SkipForward className="w-6 h-6" />
              </button>
            </div>
          </div>
        );
      }

      // ===== COMPLETE VIEW =====
      if (view === 'complete') {
        return (
          <div className="min-h-screen bg-gradient-to-b from-emerald-700 to-emerald-900 text-white flex items-center justify-center p-6">
            <div className="text-center max-w-md">
              <div className="bg-white/20 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                <Trophy className="w-12 h-12 text-yellow-300" />
              </div>
              <h2 className="text-4xl font-bold mb-3">Bravo!</h2>
              <p className="text-xl mb-2 opacity-90">{workout?.title} completato</p>
              <p className="text-lg opacity-75 mb-8">⏱ {fmtTime(totalElapsed)} di allenamento</p>
              <div className="bg-black/20 rounded-2xl p-4 mb-6 text-sm space-y-2">
                <p>💧 Idratati subito con acqua e sali minerali</p>
                <p>🥗 Pasto leggero entro 60 minuti</p>
                <p>😴 Dormi bene per ottimizzare il recupero</p>
              </div>
              <button onClick={goHome}
                className="bg-white text-emerald-800 font-bold px-8 py-4 rounded-2xl active:scale-95 transition-transform w-full mb-3">
                Scegli un altro giorno
              </button>
              <button onClick={goHub}
                className="bg-white/10 hover:bg-white/20 text-white font-semibold px-8 py-3 rounded-2xl active:scale-95 transition-transform w-full text-sm">
                ← Torna all'hub
              </button>
            </div>
          </div>
        );
      }

      return null;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OutdoorTraining />);
  </script>
</body>
</html>
